<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b234b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./assets/ww-logo.png">
  <title>合晶科技 6S 稽核管理系統</title>
  <style>
    :root {
      --bg-main: #071a3a;
      --bg-card: #0e2b5d;
      --bg-card-2: #0b234b;
      --line: #35568f;
      --accent: #4f8dff;
      --text: #ffffff;
      --text-soft: #d5e4ff;
      --ok: #32d17f;
      --ng: #ff7979;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      background:
        radial-gradient(circle at top right, #1e3f78 0%, transparent 42%),
        radial-gradient(circle at bottom left, #123366 0%, transparent 52%),
        var(--bg-main);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .dashboard {
      width: min(980px, 100%);
      background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-card-2) 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 22px 28px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-logo {
      width: 220px;
      max-width: 40vw;
      height: auto;
      border-radius: 10px;
      background: #ffffff;
      padding: 8px;
    }

    .brand-text h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      letter-spacing: 0.8px;
    }

    .brand-text p {
      margin: 6px 0 0;
      color: var(--text-soft);
      font-size: 0.9rem;
    }

    .meta {
      text-align: right;
      color: var(--text-soft);
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .content { padding: 22px 28px 28px; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.88rem;
      color: var(--text-soft);
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.96rem;
      font-family: inherit;
    }

    .field textarea {
      min-height: 90px;
      resize: vertical;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.01);
    }

    .table th,
    .table td {
      border-bottom: 1px solid var(--line);
      padding: 14px 16px;
      text-align: left;
    }

    .table tr:last-child td { border-bottom: none; }

    .table th {
      color: var(--text-soft);
      font-size: 0.85rem;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      background: rgba(0, 0, 0, 0.18);
    }

    .item { font-size: 1rem; font-weight: 600; }

    .status {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 12px;
      cursor: pointer;
      user-select: none;
      font-size: 0.92rem;
    }

    .status input {
      accent-color: var(--accent);
      transform: translateY(1px);
    }

    .section-title {
      margin: 18px 0 10px;
      font-weight: 700;
      color: var(--text-soft);
      letter-spacing: 0.5px;
    }

    .signature-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
    }

    #signatureCanvas {
      width: 100%;
      height: 160px;
      border: 1px dashed rgba(255, 255, 255, 0.45);
      border-radius: 8px;
      background: #ffffff;
      touch-action: none;
      display: block;
    }

    .photo-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    #photoInput {
      display: none;
    }

    .photo-preview-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #photoPreview {
      max-width: 100%;
      max-height: 220px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      display: none;
      object-fit: contain;
      background: #ffffff;
    }

    .photo-placeholder {
      color: var(--text-soft);
      font-size: 0.9rem;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      color: var(--text);
      font-weight: 700;
      letter-spacing: 0.4px;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.2s ease;
      margin-left: 6px;
      margin-top: 4px;
    }

    .btn:hover { transform: translateY(-1px); opacity: 0.95; }

    .btn-primary { background: linear-gradient(180deg, #4f8dff, #2f68d6); }
    .btn-secondary {
      background: linear-gradient(180deg, #34507d, #263f66);
      border: 1px solid var(--line);
    }

    .score { font-weight: 700; color: var(--text-soft); }
    .score strong { color: var(--text); font-size: 1.05rem; }
    .tag-ok { color: var(--ok); }
    .tag-ng { color: var(--ng); }

    @media (max-width: 820px) {
      .header { flex-direction: column; align-items: flex-start; }
      .meta { text-align: left; }
      .info-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 700px) {
      .header, .content { padding-left: 18px; padding-right: 18px; }
      .table th, .table td { padding: 12px 10px; }
    }

    @media print {
      body {
        background: #ffffff;
        color: #000000;
        display: block;
        padding: 0;
      }

      .dashboard {
        width: 100%;
        border: 1px solid #d2d2d2;
        border-radius: 0;
        box-shadow: none;
        background: #ffffff;
        color: #000000;
      }

      .header, .table th, .signature-wrap { background: #ffffff; }
      .photo-preview-wrap { background: #ffffff; }
      .meta, .score, .field, .brand-text p { color: #333333; }
      .btn { display: none; }
      .field input, .field textarea, .table, .table td, .table th {
        border-color: #b9b9b9;
        color: #000000;
        background: #ffffff;
      }
    }
  </style>
</head>
<body>
  <main class="dashboard" aria-label="6S 稽核管理面板">
    <header class="header">
      <div class="brand">
        <img class="brand-logo" src="./assets/ww-logo.png" alt="合晶科技 Logo">
        <div class="brand-text">
          <h1>合晶科技 6S 現場稽核管理系統</h1>
          <p>專業工廠管理與現場品質稽核表單</p>
        </div>
      </div>
      <div class="meta">
        <div>稽核日期：<span id="today"></span></div>
        <div>表單版本：A-01</div>
      </div>
    </header>

    <section class="content">
      <div class="info-grid">
        <label class="field">班別
          <input type="text" id="shiftInput" placeholder="例如：白班">
        </label>
        <label class="field">區域
          <input type="text" id="areaInput" placeholder="例如：第一生產線">
        </label>
        <label class="field">稽核人員
          <input type="text" id="auditorInput" placeholder="請輸入姓名">
        </label>
      </div>

      <table class="table" role="table" aria-label="6S 稽核項目表">
        <thead>
          <tr>
            <th style="width: 70px;">編號</th>
            <th>檢查項目</th>
            <th style="width: 280px;">稽核結果</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>01</td>
            <td class="item">走道通暢</td>
            <td>
              <div class="status">
                <label><input type="radio" name="item1" value="ok" checked> <span class="tag-ok">合格</span></label>
                <label><input type="radio" name="item1" value="ng"> <span class="tag-ng">不合格</span></label>
              </div>
            </td>
          </tr>
          <tr>
            <td>02</td>
            <td class="item">設備無灰塵</td>
            <td>
              <div class="status">
                <label><input type="radio" name="item2" value="ok" checked> <span class="tag-ok">合格</span></label>
                <label><input type="radio" name="item2" value="ng"> <span class="tag-ng">不合格</span></label>
              </div>
            </td>
          </tr>
          <tr>
            <td>03</td>
            <td class="item">標籤明確</td>
            <td>
              <div class="status">
                <label><input type="radio" name="item3" value="ok" checked> <span class="tag-ok">合格</span></label>
                <label><input type="radio" name="item3" value="ng"> <span class="tag-ng">不合格</span></label>
              </div>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="section-title">稽核現場照片</div>
      <div class="photo-row">
        <input type="file" id="photoInput" accept="image/*" capture="environment">
        <button class="btn btn-secondary" id="captureBtn">拍照 / 上傳照片</button>
        <button class="btn btn-secondary" id="clearPhotoBtn">清除照片</button>
      </div>
      <div class="photo-preview-wrap">
        <img id="photoPreview" alt="稽核現場縮圖預覽">
        <div id="photoPlaceholder" class="photo-placeholder">尚未上傳照片</div>
      </div>

      <div class="section-title">稽核備註</div>
      <label class="field">
        <textarea id="noteInput" placeholder="請記錄異常現象、改善建議或追蹤事項..."></textarea>
      </label>

      <div class="section-title">稽核人員簽名</div>
      <div class="signature-wrap">
        <canvas id="signatureCanvas"></canvas>
      </div>

      <div class="footer">
        <div class="score">目前合格率：<strong id="score">100%</strong></div>
        <div>
          <button class="btn btn-secondary" id="clearSignBtn">清除簽名</button>
          <button class="btn btn-secondary" id="resetBtn">重設結果</button>
          <button class="btn btn-secondary" id="printBtn">列印 / 匯出 PDF</button>
          <button class="btn btn-primary" id="saveBtn">儲存稽核</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "hj_6s_audit_v1";
    const dateTarget = document.getElementById("today");
    const scoreTarget = document.getElementById("score");
    const radios = Array.from(document.querySelectorAll('input[type="radio"]'));
    const resetBtn = document.getElementById("resetBtn");
    const saveBtn = document.getElementById("saveBtn");
    const printBtn = document.getElementById("printBtn");
    const clearSignBtn = document.getElementById("clearSignBtn");
    const shiftInput = document.getElementById("shiftInput");
    const areaInput = document.getElementById("areaInput");
    const auditorInput = document.getElementById("auditorInput");
    const noteInput = document.getElementById("noteInput");
    const photoInput = document.getElementById("photoInput");
    const captureBtn = document.getElementById("captureBtn");
    const clearPhotoBtn = document.getElementById("clearPhotoBtn");
    const photoPreview = document.getElementById("photoPreview");
    const photoPlaceholder = document.getElementById("photoPlaceholder");
    const canvas = document.getElementById("signatureCanvas");
    const ctx = canvas.getContext("2d");
    let drawing = false;
    let currentPhotoData = "";

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}/${month}/${day}`;
    }

    function updateScore() {
      const groups = ["item1", "item2", "item3"];
      const passed = groups.filter((name) => {
        const checked = document.querySelector(`input[name="${name}"]:checked`);
        return checked && checked.value === "ok";
      }).length;
      const percent = Math.round((passed / groups.length) * 100);
      scoreTarget.textContent = `${percent}%`;
    }

    function setCanvasSize() {
      const ratio = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.floor(rect.width * ratio);
      canvas.height = Math.floor(rect.height * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.lineWidth = 2;
      ctx.lineCap = "round";
      ctx.strokeStyle = "#0b234b";
    }

    function getPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const source = event.touches ? event.touches[0] : event;
      return {
        x: source.clientX - rect.left,
        y: source.clientY - rect.top
      };
    }

    function startDrawing(event) {
      drawing = true;
      const point = getPoint(event);
      ctx.beginPath();
      ctx.moveTo(point.x, point.y);
      event.preventDefault();
    }

    function draw(event) {
      if (!drawing) return;
      const point = getPoint(event);
      ctx.lineTo(point.x, point.y);
      ctx.stroke();
      event.preventDefault();
    }

    function stopDrawing() {
      if (!drawing) return;
      drawing = false;
      saveToLocal();
    }

    function clearSignature(save = true) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (save) saveToLocal();
    }

    function collectData() {
      return {
        date: dateTarget.textContent,
        shift: shiftInput.value.trim(),
        area: areaInput.value.trim(),
        auditor: auditorInput.value.trim(),
        note: noteInput.value,
        items: {
          item1: document.querySelector('input[name="item1"]:checked')?.value || "ok",
          item2: document.querySelector('input[name="item2"]:checked')?.value || "ok",
          item3: document.querySelector('input[name="item3"]:checked')?.value || "ok"
        },
        score: scoreTarget.textContent,
        photo: currentPhotoData,
        signature: canvas.toDataURL("image/png")
      };
    }

    function saveToLocal() {
      updateScore();
      const data = collectData();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function setPhotoPreview(dataUrl) {
      if (dataUrl) {
        photoPreview.src = dataUrl;
        photoPreview.style.display = "block";
        photoPlaceholder.style.display = "none";
      } else {
        photoPreview.removeAttribute("src");
        photoPreview.style.display = "none";
        photoPlaceholder.style.display = "block";
      }
    }

    function compressImage(file, callback) {
      const reader = new FileReader();
      reader.onload = () => {
        const image = new Image();
        image.onload = () => {
          const maxWidth = 720;
          const maxHeight = 720;
          const ratio = Math.min(maxWidth / image.width, maxHeight / image.height, 1);
          const targetWidth = Math.floor(image.width * ratio);
          const targetHeight = Math.floor(image.height * ratio);
          const tempCanvas = document.createElement("canvas");
          const tempCtx = tempCanvas.getContext("2d");
          tempCanvas.width = targetWidth;
          tempCanvas.height = targetHeight;
          tempCtx.drawImage(image, 0, 0, targetWidth, targetHeight);
          const dataUrl = tempCanvas.toDataURL("image/jpeg", 0.78);
          callback(dataUrl);
        };
        image.src = reader.result;
      };
      reader.readAsDataURL(file);
    }

    function applySavedData(data) {
      if (!data) return;
      shiftInput.value = data.shift || "";
      areaInput.value = data.area || "";
      auditorInput.value = data.auditor || "";
      noteInput.value = data.note || "";

      ["item1", "item2", "item3"].forEach((name) => {
        const value = data.items && data.items[name] ? data.items[name] : "ok";
        const target = document.querySelector(`input[name="${name}"][value="${value}"]`);
        if (target) target.checked = true;
      });

      if (data.signature) {
        const image = new Image();
        image.onload = () => {
          ctx.drawImage(image, 0, 0, canvas.clientWidth, canvas.clientHeight);
        };
        image.src = data.signature;
      }

      currentPhotoData = data.photo || "";
      setPhotoPreview(currentPhotoData);
    }

    dateTarget.textContent = formatDate(new Date());
    setCanvasSize();

    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        applySavedData(JSON.parse(saved));
      } catch (error) {
        localStorage.removeItem(STORAGE_KEY);
      }
    } else {
      shiftInput.value = "白班";
      areaInput.value = "第一生產線";
      setPhotoPreview("");
    }

    updateScore();

    radios.forEach((radio) => {
      radio.addEventListener("change", saveToLocal);
    });

    [shiftInput, areaInput, auditorInput, noteInput].forEach((input) => {
      input.addEventListener("input", saveToLocal);
    });

    captureBtn.addEventListener("click", () => {
      photoInput.click();
    });

    photoInput.addEventListener("change", (event) => {
      const [file] = event.target.files || [];
      if (!file) return;
      compressImage(file, (dataUrl) => {
        currentPhotoData = dataUrl;
        setPhotoPreview(currentPhotoData);
        saveToLocal();
      });
      photoInput.value = "";
    });

    clearPhotoBtn.addEventListener("click", () => {
      currentPhotoData = "";
      setPhotoPreview("");
      saveToLocal();
    });

    resetBtn.addEventListener("click", () => {
      ["item1", "item2", "item3"].forEach((name) => {
        const okRadio = document.querySelector(`input[name="${name}"][value="ok"]`);
        if (okRadio) okRadio.checked = true;
      });
      noteInput.value = "";
      currentPhotoData = "";
      setPhotoPreview("");
      clearSignature(false);
      saveToLocal();
    });

    saveBtn.addEventListener("click", () => {
      saveToLocal();
      alert("稽核結果已儲存到本機瀏覽器。");
    });

    printBtn.addEventListener("click", () => {
      saveToLocal();
      window.print();
    });

    clearSignBtn.addEventListener("click", () => {
      clearSignature(true);
    });

    canvas.addEventListener("mousedown", startDrawing);
    canvas.addEventListener("mousemove", draw);
    canvas.addEventListener("mouseup", stopDrawing);
    canvas.addEventListener("mouseleave", stopDrawing);

    canvas.addEventListener("touchstart", startDrawing, { passive: false });
    canvas.addEventListener("touchmove", draw, { passive: false });
    canvas.addEventListener("touchend", stopDrawing);

    window.addEventListener("resize", () => {
      const current = collectData();
      setCanvasSize();
      if (current.signature) {
        const image = new Image();
        image.onload = () => {
          ctx.drawImage(image, 0, 0, canvas.clientWidth, canvas.clientHeight);
        };
        image.src = current.signature;
      }
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
