<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b234b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./ww-logo.png">
  <title>合晶科技 6S 稽核管理系統</title>
  <style>
    :root {
      --bg-main: #071a3a;
      --bg-card: #0e2b5d;
      --bg-card-2: #0b234b;
      --line: #35568f;
      --accent: #4f8dff;
      --text: #ffffff;
      --text-soft: #d5e4ff;
      --ok: #32d17f;
      --ng: #ff7979;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      background:
        radial-gradient(circle at top right, #1e3f78 0%, transparent 42%),
        radial-gradient(circle at bottom left, #123366 0%, transparent 52%),
        var(--bg-main);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .dashboard {
      width: min(980px, 100%);
      background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-card-2) 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 22px 28px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-logo {
      width: 220px;
      max-width: 40vw;
      height: auto;
      border-radius: 10px;
      background: #ffffff;
      padding: 8px;
    }

    .brand-text h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      letter-spacing: 0.8px;
    }

    .brand-text p {
      margin: 6px 0 0;
      color: var(--text-soft);
      font-size: 0.9rem;
    }

    .meta {
      text-align: right;
      color: var(--text-soft);
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .content { padding: 22px 28px 28px; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.88rem;
      color: var(--text-soft);
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.96rem;
      font-family: inherit;
    }

    .field textarea {
      min-height: 90px;
      resize: vertical;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.01);
    }

    .table th,
    .table td {
      border-bottom: 1px solid var(--line);
      padding: 14px 16px;
      text-align: left;
    }

    .table tr:last-child td { border-bottom: none; }

    .table th {
      color: var(--text-soft);
      font-size: 0.85rem;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      background: rgba(0, 0, 0, 0.18);
    }

    .item { font-size: 1rem; font-weight: 600; }

    .checklist {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .check-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
    }

    .check-item-top {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .check-item-name {
      font-size: 1rem;
      font-weight: 700;
    }

    .status {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 12px;
      cursor: pointer;
      user-select: none;
      font-size: 0.92rem;
    }

    .status label.ok-option {
      border-color: rgba(50, 209, 127, 0.65);
      background: rgba(50, 209, 127, 0.15);
    }

    .status label.ng-option {
      border-color: rgba(255, 121, 121, 0.7);
      background: rgba(255, 121, 121, 0.14);
    }

    .status input {
      accent-color: var(--accent);
      transform: translateY(1px);
    }

    .section-title {
      margin: 18px 0 10px;
      font-weight: 700;
      color: var(--text-soft);
      letter-spacing: 0.5px;
    }

    .signature-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
    }

    #signatureCanvas {
      width: 100%;
      height: 160px;
      border: 1px dashed rgba(255, 255, 255, 0.45);
      border-radius: 8px;
      background: #ffffff;
      touch-action: none;
      display: block;
    }

    .photo-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    #photoInput {
      display: none;
    }

    .photo-preview-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #photoPreview {
      max-width: 100%;
      max-height: 220px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      display: none;
      object-fit: contain;
      background: #ffffff;
    }

    .item-photo-preview {
      max-width: 160px;
      max-height: 110px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      display: none;
      object-fit: contain;
      background: #ffffff;
    }

    .photo-placeholder {
      color: var(--text-soft);
      font-size: 0.9rem;
    }

    .item-photo-placeholder {
      color: var(--text-soft);
      font-size: 0.82rem;
    }

    #printSummaryWrap {
      display: none;
      margin-top: 14px;
    }

    #printSummaryTable {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid #b9b9b9;
      font-size: 0.92rem;
    }

    #printSummaryTable th,
    #printSummaryTable td {
      border: 1px solid #b9b9b9;
      padding: 6px 8px;
      color: #000000;
      background: #ffffff;
    }

    .ng-mark {
      color: #b00000;
      font-weight: 700;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      color: var(--text);
      font-weight: 700;
      letter-spacing: 0.4px;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.2s ease;
      margin-left: 6px;
      margin-top: 4px;
    }

    .btn:hover { transform: translateY(-1px); opacity: 0.95; }

    .btn-primary { background: linear-gradient(180deg, #4f8dff, #2f68d6); }
    .btn-secondary {
      background: linear-gradient(180deg, #34507d, #263f66);
      border: 1px solid var(--line);
    }

    .score { font-weight: 700; color: var(--text-soft); }
    .score strong { color: var(--text); font-size: 1.05rem; }
    .tag-ok { color: var(--ok); }
    .tag-ng { color: var(--ng); }

    @media (max-width: 820px) {
      .header { flex-direction: column; align-items: flex-start; }
      .meta { text-align: left; }
      .info-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 700px) {
      .header, .content { padding-left: 18px; padding-right: 18px; }
      .table th, .table td { padding: 12px 10px; }
    }

    @media print {
      body {
        background: #ffffff;
        color: #000000;
        display: block;
        padding: 0;
      }

      .dashboard {
        width: 100%;
        border: 1px solid #d2d2d2;
        border-radius: 0;
        box-shadow: none;
        background: #ffffff;
        color: #000000;
      }

      .header, .table th, .signature-wrap { background: #ffffff; }
      .photo-preview-wrap { background: #ffffff; }
      .meta, .score, .field, .brand-text p { color: #333333; }
      .btn { display: none; }
      #printSummaryWrap { display: block; }
      .field input, .field textarea, .table, .table td, .table th {
        border-color: #b9b9b9;
        color: #000000;
        background: #ffffff;
      }
    }
  </style>
</head>
<body>
  <main class="dashboard" aria-label="6S 稽核管理面板">
    <header class="header">
      <div class="brand">
        <img class="brand-logo" src="./ww-logo.png" alt="合晶科技 Logo">
        <div class="brand-text">
          <h1>合晶科技 6S 現場稽核管理系統</h1>
          <p>專業工廠管理與現場品質稽核表單</p>
        </div>
      </div>
      <div class="meta">
        <div>稽核日期：<span id="today"></span></div>
        <div>表單版本：A-01</div>
      </div>
    </header>

    <section class="content">
      <div class="info-grid">
        <label class="field">班別
          <input type="text" id="shiftInput" placeholder="例如：白班">
        </label>
        <label class="field">區域
          <input type="text" id="areaInput" placeholder="例如：第一生產線">
        </label>
        <label class="field">稽核人員
          <input type="text" id="auditorInput" placeholder="請輸入姓名">
        </label>
      </div>

      <div class="section-title">6S 點檢清單（16 項）</div>
      <div id="checklistContainer" class="checklist"></div>
      <div id="printSummaryWrap">
        <div class="section-title" style="color:#000000;">點檢結果總結表</div>
        <table id="printSummaryTable" aria-label="點檢結果總結表">
          <thead>
            <tr>
              <th style="width:70px;">編號</th>
              <th>點檢項目</th>
              <th style="width:220px;">狀態</th>
            </tr>
          </thead>
          <tbody id="printSummaryBody"></tbody>
        </table>
      </div>

      <div class="section-title">稽核備註</div>
      <label class="field">
        <textarea id="noteInput" placeholder="請記錄異常現象、改善建議或追蹤事項..."></textarea>
      </label>

      <div class="section-title">稽核人員簽名</div>
      <div class="signature-wrap">
        <canvas id="signatureCanvas"></canvas>
      </div>

      <div class="footer">
        <div class="score">目前合格率：<strong id="score">100%</strong></div>
        <div>
          <button class="btn btn-secondary" id="clearSignBtn">清除簽名</button>
          <button class="btn btn-secondary" id="resetBtn">重設結果</button>
          <button class="btn btn-secondary" id="printBtn">列印 / 匯出 PDF</button>
          <button class="btn btn-primary" id="saveBtn">儲存稽核</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "hj_6s_audit_v2";
    const CHECK_ITEMS = [
      "無雜物",
      "專用推車定位",
      "牆角無積塵",
      "進出除塵",
      "設備無油污殘膠",
      "Lot卡定位",
      "緊急按鈕無遮蔽",
      "當班廢棄物清理",
      "儀器鏡面清潔",
      "標準片有效",
      "紀錄本整齊",
      "儀器恢復初始",
      "包材隨手清",
      "刀具安全收納",
      "地面無纖維碎屑",
      "物料標示清晰"
    ];
    const STATUS_OPTIONS = [
      { value: "all_ok", label: "全區合格", kind: "ok" },
      { value: "n_ng", label: "N不合格", kind: "ng" },
      { value: "p_ng", label: "P不合格", kind: "ng" },
      { value: "measure_ng", label: "量測不合格", kind: "ng" },
      { value: "pack_ng", label: "包裝不合格", kind: "ng" }
    ];
    const STATUS_TEXT = {
      all_ok: "全區合格",
      n_ng: "N不合格",
      p_ng: "P不合格",
      measure_ng: "量測不合格",
      pack_ng: "包裝不合格"
    };
    const dateTarget = document.getElementById("today");
    const scoreTarget = document.getElementById("score");
    const checklistContainer = document.getElementById("checklistContainer");
    const printSummaryBody = document.getElementById("printSummaryBody");
    const resetBtn = document.getElementById("resetBtn");
    const saveBtn = document.getElementById("saveBtn");
    const printBtn = document.getElementById("printBtn");
    const clearSignBtn = document.getElementById("clearSignBtn");
    const shiftInput = document.getElementById("shiftInput");
    const areaInput = document.getElementById("areaInput");
    const auditorInput = document.getElementById("auditorInput");
    const noteInput = document.getElementById("noteInput");
    const canvas = document.getElementById("signatureCanvas");
    const ctx = canvas.getContext("2d");
    let drawing = false;
    let itemPhotos = {};

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}/${month}/${day}`;
    }

    function updateScore() {
      const passed = CHECK_ITEMS.filter((_, index) => {
        const checked = document.querySelector(`input[name="item_${index}"]:checked`);
        return checked && checked.value === "all_ok";
      }).length;
      const percent = Math.round((passed / CHECK_ITEMS.length) * 100);
      scoreTarget.textContent = `${percent}%`;
    }

    function renderChecklist() {
      checklistContainer.innerHTML = CHECK_ITEMS.map((item, index) => {
        const options = STATUS_OPTIONS.map((option) => {
          const cls = option.kind === "ok" ? "ok-option" : "ng-option";
          return `
            <label class="${cls}">
              <input type="radio" name="item_${index}" value="${option.value}">
              <span>${option.label}</span>
            </label>
          `;
        }).join("");
        return `
          <div class="check-item" data-item-index="${index}">
            <div class="check-item-top">
              <div class="check-item-name">${String(index + 1).padStart(2, "0")}. ${item}</div>
              <div class="status">${options}</div>
            </div>
            <div class="photo-row">
              <input type="file" id="photo_input_${index}" accept="image/*" capture="environment" style="display:none;">
              <button type="button" class="btn btn-secondary capture-item-btn" data-index="${index}">拍照</button>
              <button type="button" class="btn btn-secondary clear-item-photo-btn" data-index="${index}">清除照片</button>
              <span class="item-photo-placeholder" id="photo_note_${index}">尚未拍照</span>
            </div>
            <div>
              <img id="photo_preview_${index}" class="item-photo-preview" alt="點檢項目照片預覽">
            </div>
          </div>
        `;
      }).join("");
    }

    function setCanvasSize() {
      const ratio = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.floor(rect.width * ratio);
      canvas.height = Math.floor(rect.height * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.lineWidth = 2;
      ctx.lineCap = "round";
      ctx.strokeStyle = "#0b234b";
    }

    function getPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const source = event.touches ? event.touches[0] : event;
      return {
        x: source.clientX - rect.left,
        y: source.clientY - rect.top
      };
    }

    function startDrawing(event) {
      drawing = true;
      const point = getPoint(event);
      ctx.beginPath();
      ctx.moveTo(point.x, point.y);
      event.preventDefault();
    }

    function draw(event) {
      if (!drawing) return;
      const point = getPoint(event);
      ctx.lineTo(point.x, point.y);
      ctx.stroke();
      event.preventDefault();
    }

    function stopDrawing() {
      if (!drawing) return;
      drawing = false;
      saveToLocal();
    }

    function clearSignature(save = true) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (save) saveToLocal();
    }

    function collectData() {
      const selections = {};
      CHECK_ITEMS.forEach((_, index) => {
        selections[`item_${index}`] = document.querySelector(`input[name="item_${index}"]:checked`)?.value || "";
      });
      return {
        date: dateTarget.textContent,
        shift: shiftInput.value.trim(),
        area: areaInput.value.trim(),
        auditor: auditorInput.value.trim(),
        note: noteInput.value,
        items: selections,
        score: scoreTarget.textContent,
        itemPhotos,
        signature: canvas.toDataURL("image/png")
      };
    }

    function saveToLocal() {
      updateScore();
      const data = collectData();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function setItemPhotoPreview(index, dataUrl) {
      const preview = document.getElementById(`photo_preview_${index}`);
      const note = document.getElementById(`photo_note_${index}`);
      if (!preview || !note) return;
      if (dataUrl) {
        preview.src = dataUrl;
        preview.style.display = "block";
        note.textContent = "已附照片";
      } else {
        preview.removeAttribute("src");
        preview.style.display = "none";
        note.textContent = "尚未拍照";
      }
    }

    function compressImage(file, callback) {
      const reader = new FileReader();
      reader.onload = () => {
        const image = new Image();
        image.onload = () => {
          const maxWidth = 720;
          const maxHeight = 720;
          const ratio = Math.min(maxWidth / image.width, maxHeight / image.height, 1);
          const targetWidth = Math.floor(image.width * ratio);
          const targetHeight = Math.floor(image.height * ratio);
          const tempCanvas = document.createElement("canvas");
          const tempCtx = tempCanvas.getContext("2d");
          tempCanvas.width = targetWidth;
          tempCanvas.height = targetHeight;
          tempCtx.drawImage(image, 0, 0, targetWidth, targetHeight);
          const dataUrl = tempCanvas.toDataURL("image/jpeg", 0.78);
          callback(dataUrl);
        };
        image.src = reader.result;
      };
      reader.readAsDataURL(file);
    }

    function applySavedData(data) {
      if (!data) return;
      shiftInput.value = data.shift || "";
      areaInput.value = data.area || "";
      auditorInput.value = data.auditor || "";
      noteInput.value = data.note || "";
      itemPhotos = data.itemPhotos || {};

      CHECK_ITEMS.forEach((_, index) => {
        const name = `item_${index}`;
        const value = data.items && data.items[name] ? data.items[name] : "";
        const target = value ? document.querySelector(`input[name="${name}"][value="${value}"]`) : null;
        if (target) target.checked = true;
        setItemPhotoPreview(index, itemPhotos[index] || "");
      });

      if (data.signature) {
        const image = new Image();
        image.onload = () => {
          ctx.drawImage(image, 0, 0, canvas.clientWidth, canvas.clientHeight);
        };
        image.src = data.signature;
      }

    }

    function bindChecklistEvents() {
      const radios = Array.from(document.querySelectorAll('input[type="radio"]'));
      radios.forEach((radio) => {
        radio.addEventListener("change", saveToLocal);
      });

      CHECK_ITEMS.forEach((_, index) => {
        const fileInput = document.getElementById(`photo_input_${index}`);
        const captureButton = checklistContainer.querySelector(`.capture-item-btn[data-index="${index}"]`);
        const clearButton = checklistContainer.querySelector(`.clear-item-photo-btn[data-index="${index}"]`);

        if (captureButton && fileInput) {
          captureButton.addEventListener("click", () => fileInput.click());
        }

        if (fileInput) {
          fileInput.addEventListener("change", (event) => {
            const [file] = event.target.files || [];
            if (!file) return;
            compressImage(file, (dataUrl) => {
              itemPhotos[index] = dataUrl;
              setItemPhotoPreview(index, dataUrl);
              saveToLocal();
            });
            fileInput.value = "";
          });
        }

        if (clearButton) {
          clearButton.addEventListener("click", () => {
            delete itemPhotos[index];
            setItemPhotoPreview(index, "");
            saveToLocal();
          });
        }
      });
    }

    function validateAllItemsSelected() {
      for (let index = 0; index < CHECK_ITEMS.length; index += 1) {
        const checked = document.querySelector(`input[name="item_${index}"]:checked`);
        if (!checked) return false;
      }
      return true;
    }

    function buildPrintSummary() {
      let rows = "";
      CHECK_ITEMS.forEach((item, index) => {
        const value = document.querySelector(`input[name="item_${index}"]:checked`)?.value || "";
        const text = STATUS_TEXT[value] || "未選擇";
        const isNg = value && value !== "all_ok";
        rows += `
          <tr>
            <td>${String(index + 1).padStart(2, "0")}</td>
            <td>${item}</td>
            <td>${isNg ? `<span class="ng-mark">區域不合格：${text}</span>` : text}</td>
          </tr>
        `;
      });
      printSummaryBody.innerHTML = rows;
    }

    dateTarget.textContent = formatDate(new Date());
    renderChecklist();
    setCanvasSize();

    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        applySavedData(JSON.parse(saved));
      } catch (error) {
        localStorage.removeItem(STORAGE_KEY);
      }
    } else {
      shiftInput.value = "白班";
      areaInput.value = "第一生產線";
    }

    bindChecklistEvents();
    updateScore();

    [shiftInput, areaInput, auditorInput, noteInput].forEach((input) => {
      input.addEventListener("input", saveToLocal);
    });

    resetBtn.addEventListener("click", () => {
      CHECK_ITEMS.forEach((_, index) => {
        const checked = document.querySelector(`input[name="item_${index}"]:checked`);
        if (checked) checked.checked = false;
        delete itemPhotos[index];
        setItemPhotoPreview(index, "");
      });
      noteInput.value = "";
      clearSignature(false);
      saveToLocal();
    });

    saveBtn.addEventListener("click", () => {
      if (!validateAllItemsSelected()) {
        alert("還有項目尚未勾選！");
        return;
      }
      saveToLocal();
      alert("稽核結果已儲存到本機瀏覽器。");
    });

    printBtn.addEventListener("click", () => {
      if (!validateAllItemsSelected()) {
        alert("還有項目尚未勾選！");
        return;
      }
      saveToLocal();
      buildPrintSummary();
      window.print();
    });

    clearSignBtn.addEventListener("click", () => {
      clearSignature(true);
    });

    canvas.addEventListener("mousedown", startDrawing);
    canvas.addEventListener("mousemove", draw);
    canvas.addEventListener("mouseup", stopDrawing);
    canvas.addEventListener("mouseleave", stopDrawing);

    canvas.addEventListener("touchstart", startDrawing, { passive: false });
    canvas.addEventListener("touchmove", draw, { passive: false });
    canvas.addEventListener("touchend", stopDrawing);

    window.addEventListener("resize", () => {
      const current = collectData();
      setCanvasSize();
      if (current.signature) {
        const image = new Image();
        image.onload = () => {
          ctx.drawImage(image, 0, 0, canvas.clientWidth, canvas.clientHeight);
        };
        image.src = current.signature;
      }
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
